# docker-compose.dev.yml
services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cinntra
      POSTGRES_PASSWORD: cinntra
      POSTGRES_DB: cinntra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file: .env.dev
    depends_on:
      - qdrant
      - postgres
    volumes:
      - ./services/api:/app          # mount code for fast dev iteration
      - ./services/api/requirements.txt:/app/requirements.txt:ro
    restart: on-failure

  ingestion:
    build:
      context: ./services/ingestion
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=all-MiniLM-L6-v2
      - COLLECTION_NAME=cinntra_docs
      - INGEST_DATA_DIR=/app/data
    volumes:
      - ./services/ingestion/data:/app/data:ro
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  pgdata: