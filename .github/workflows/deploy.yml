# .github/workflows/deploy.yml
#
# Pipeline:
#   1. On every push to main → run tests + lint
#   2. On push to main (after tests pass) → build Docker image, push to GHCR,
#      then trigger a Render deploy via deploy hook
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   RENDER_DEPLOY_HOOK_URL   — from Render dashboard → your service → Deploy Hook
#   GEMINI_API_KEY           — for integration test (optional)

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test & Lint ────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r services/api/requirements.txt
          pip install ruff pytest httpx

      - name: Lint (ruff)
        run: ruff check services/api/main.py --select E,F,W --ignore E501
        continue-on-error: true   # warnings only, don't fail CI on style

      - name: Syntax check
        run: python -m py_compile services/api/main.py && echo "Syntax OK"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── 2. Build & Push Docker image (main branch only) ───────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cinntra-api:latest
            ghcr.io/${{ github.repository_owner }}/cinntra-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Render (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "Deploy triggered successfully" \
            || (echo "Deploy trigger failed" && exit 1)